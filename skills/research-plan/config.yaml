# Make Research Plan 配置文件

# 技能信息
skill_info:
  name: research-plan
  version: 0.2.0
  description: "基于文献调研制定科研分析策略；兼容旧名 make-research-plan 的 prompt 触发"
  author: "Bensz Conan"
  category: "科研工具"

# 工作目录配置
work_directory:
  # 工作目录名称
  name: ".make-research-plan"
  # 子目录名称
  subdirs:
    papers: "papers"
    metadata: "metadata"
    extracted: "extracted"
  # 输出文件名
  files:
    theme: "theme.json"
    search_history: "search_history.json"
    papers_scored: "papers_scored.json"
    papers_info: "papers_info.json"
    bibtex: "references.bib"
    analysis_framework: "analysis-framework.md"
    plan: "plan.md"

