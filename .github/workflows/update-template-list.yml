name: Sync README Template List

on:
  schedule:
    - cron: "13 * * * *"
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-readme-template-list
  cancel-in-progress: true

jobs:
  sync-template-list:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Shanghai
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Update README template list
        env:
          GH_TOKEN: ${{ github.token }}
        run: python scripts/update_readme_template_list.py --repo "${{ github.repository }}"

      - name: Detect changes
        id: changes
        run: |
          if git diff --quiet -- README.md; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit README update
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "docs: sync template list from latest release"
          git push
